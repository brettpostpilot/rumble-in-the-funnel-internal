const keys={},justPressed={};
document.addEventListener("keydown",e=>{
  if(screen==="enterName"){
    if(e.key==="Enter"){e.preventDefault();if(nameSubmitted)return;const err=validateEntry(nameInput);if(err){entryError=err;return}entryError="";if(containsProfanity(nameInput)){entryError="KEEP IT CLEAN, CHAMP!";return}nameSubmitted=true;submitScore(nameInput.trim(),"",gameScore).then(()=>{screen="matchEnd";matchEndTimer=0});return}
    if(e.key==="Backspace"){e.preventDefault();entryError="";nameInput=nameInput.slice(0,-1);return}
    if(e.key.length===1&&!e.ctrlKey&&!e.metaKey){e.preventDefault();entryError="";if(nameInput.length<20)nameInput+=e.key;return}
    e.preventDefault();return}
  if(!keys[e.key])justPressed[e.key]=true;keys[e.key]=true;e.preventDefault()});

document.addEventListener("paste",e=>{
  if(screen!=="enterName")return;e.preventDefault();
  const text=(e.clipboardData||window.clipboardData).getData("text").replace(/[\r\n\t]/g,"");
  if(!text)return;if(containsProfanity(text)){entryError="KEEP IT CLEAN, CHAMP!";return}entryError="";
  nameInput=(nameInput+text).substring(0,20)});
const PK={left:"ArrowLeft",right:"ArrowRight",up:"ArrowUp",down:"ArrowDown",jab:"z",hook:"x",upper:"c",special:"v"};

// ═══════ FIREBASE ═══════
const FIREBASE_URL="https://fight-cac-default-rtdb.firebaseio.com";
const LB_PATH="/leaderboard-internal";
let leaderboard=[],leaderboardLoaded=false,entryError="";

async function fetchLeaderboard(){
  try{const res=await fetch(FIREBASE_URL+LB_PATH+".json");const data=await res.json();
    leaderboard=data?Object.values(data).sort((a,b)=>b.score-a.score).slice(0,10):[];leaderboardLoaded=true;
  }catch(e){console.warn("LB fetch:",e);leaderboardLoaded=true}}

async function submitScore(name,company,score){
  if(containsProfanity(name)){entryError="KEEP IT CLEAN, CHAMP!";nameSubmitted=false;return}
  try{await fetch(FIREBASE_URL+LB_PATH+".json",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,score,date:new Date().toISOString()})});await fetchLeaderboard()}catch(e){console.warn("Submit:",e)}}
fetchLeaderboard();

// ═══════ PROFANITY FILTER ═══════
const BLOCKED_WORDS=["fuck","shit","ass","damn","bitch","bastard","dick","cock","pussy","cunt","whore","slut","fag","faggot","nigger","nigga","retard","rape","penis","vagina","boob","tits","titty","anus","dildo","jizz","cum","wank","piss","crap","twat","douche","hoe","milf","porn","sexy","nude","naked","erotic","orgasm","blowjob","handjob","butthole","asshole","dumbass","jackass","dipshit","bullshit","motherfuck","fucker","stfu","wtf","lmao","thot","simp","incel","nazi","hitler","kill","murder","suicide","terrorist","bomb","shoot","drug","cocaine","heroin","meth","weed","marijuana"];
function normalizeText(t){return t.toLowerCase().replace(/[@4]/g,"a").replace(/[3]/g,"e").replace(/[1!|]/g,"i").replace(/[0]/g,"o").replace(/[5\$]/g,"s").replace(/[7]/g,"t").replace(/[+]/g,"t").replace(/ph/g,"f").replace(/[^a-z]/g,"")}
function containsProfanity(t){if(!t||!t.trim())return false;const n=normalizeText(t);for(const w of BLOCKED_WORDS)if(n.includes(w))return true;const s=t.toLowerCase().replace(/[^a-z]/g,"");for(const w of BLOCKED_WORDS)if(s.includes(w))return true;const words=t.toLowerCase().split(/\s+/);for(const wd of words){const c=wd.replace(/[^a-z]/g,"");for(const b of BLOCKED_WORDS)if(c===b)return true}return false}
function validateEntry(name){if(name.trim().length===0)return"ENTER YOUR NAME";if(name.trim().length<2)return"NAME TOO SHORT";if(containsProfanity(name))return"KEEP IT CLEAN, CHAMP!";if(/^(.)\1{4,}$/.test(name.trim()))return"NICE TRY \u2014 ENTER A REAL NAME";return null}

// ═══════ SCORING ═══════
let gameScore=0,nameInput="",companyInput="",activeField="name",nameSubmitted=false;

const GROUND=320,GRAVITY=0.42,WALK_SPD=2.1,JUMP_FORCE=-9,PUSH_DIST=50,RING_L=55,RING_R=W-55;

hook:{dmg:9,range:62,startup:8,active:6,recovery:18,hitstun:22,blockstun:12,push:4},

};

let screen="title",frame=0,roundNum=1,pWins=0,vWins=0;
let roundTimer=99,timerAccum=0,roundEndTimer=0,matchEndTimer=0,introTimer=0;
let hitSpark=null,screenShake=0,announceText="",announceTimer=0;

function makePlayer(x,facing,isPlayer){
  return{x,y:GROUND,vx:0,vy:0,facing,isPlayer,hp:100,maxHp:100,special:isPlayer?30:100,maxSpecial:100,
    state:"idle",attackType:null,attackFrame:0,hitThisAttack:false,stunFrames:0,knockdownFrames:0,

}

let player,villain;
function resetRound(){
  player=makePlayer(200,1,true);player.special=30;
  villain=makePlayer(440,-1,false);
  villain.aiAggro=0.35+roundNum*0.08+vWins*0.1;

}
function startMatch(){pWins=0;vWins=0;roundNum=1;gameScore=0;nameInput="";companyInput="";activeField="name";nameSubmitted=false;entryError="";screen="intro";introTimer=0;}

function dp(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),w,h)}
function dc(x,y,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.arc(Math.round(x),Math.round(y),r,0,Math.PI*2);ctx.fill()}
function dob(x,y,w,h,f,o){ctx.fillStyle=o;ctx.fillRect(x-1,y-1,w+2,h+2);ctx.fillStyle=f;ctx.fillRect(x,y,w,h)}

// ═══════ DRAW BOXER — SHARED FUNCTION ═══════
function drawBoxer(p,isP1){
  const f=frame,{x,y,facing,state,attackType,attackFrame,blocking,crouching,stunned,hp,maxHp}=p;
  let shX=0,alpha=1,bsq=0;
  if(state==="hitstun"){shX=(f%4<2?3:-3)*p.hitDir;alpha=0.8}
  if(state==="blockstun"){shX=(f%4<2?2:-2)*p.hitDir}
  if(state==="knockdown"){alpha=0.5+Math.sin(f*0.2)*0.15;bsq=Math.min(p.knockdownFrames>60?(90-p.knockdownFrames)*0.5:15,15)}
  if(stunned)shX=Math.sin(f*0.3)*2;
  if(crouching)bsq=12;

  // Body type — Drew: tall lean | Mike: short stocky
  const S=isP1?1.35:0.85,WS=isP1?0.95:1.5,HS=isP1?1.0:1.2;
  const gloveS=isP1?1.0:1.25,reachS=isP1?1.2:0.85;
  const OL="#0A0A0A";

  ctx.save();ctx.globalAlpha=alpha;
  ctx.translate(Math.round(x+shX),Math.round(y+bsq));
  if(facing===-1)ctx.scale(-1,1);

  const sk=isP1?C.skin:C.paleSkin,skD=isP1?C.skinDark:C.paleSkinDark,skS2=isP1?C.skinShadow:C.paleSkinShadow;
  const glove=isP1?C.green:C.metaBlue,gloveDk=isP1?"#7AA830":C.metaBlueDark,gloveHi=isP1?C.lime:C.metaBlueGlow;
  const trunks=isP1?"#1A1E22":"#1A1040",trunksBand=isP1?C.green:C.metaBlue;
  const tankTop=isP1?C.green:"#444850",tankDk=isP1?"#7AA830":"#333840";
  const hair=isP1?"#D8D8E0":"#3A2A14",hairHi=isP1?"#F0F0F8":"#4A3A24";
  const boot=isP1?C.green:C.metaBlue,bootDk=isP1?"#6A9020":C.metaBlueDark;
  const idle=Math.sin(f*0.04)*2;

  // Shadow
  ctx.globalAlpha=alpha*0.35;ctx.fillStyle="#000";ctx.beginPath();ctx.ellipse(0,26,22*WS,5+WS,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=alpha;

  const legSp=state==="walk"?Math.sin(p.walkCycle*0.18)*5:0;
  const legH=Math.round((crouching?14:24)*S),legW=Math.round(10*WS),legG=Math.round(7*WS);
  const bootH2=Math.round(9*S),bW=legW+4;
  const trkH=Math.round(14*S),trkW=Math.round(16*WS),trkY=-Math.round(8*S)-bsq;
  const torH=Math.round((crouching?24:38)*S),torW=Math.round(18*WS),torY=trkY-torH+2;
  const shW=Math.round(20*WS),shH2=Math.round(16*S);
  const hdH2=Math.round(28*HS),hdW=Math.round(17*HS);
  const nkH=Math.round(10*S),nkW=Math.round(6*WS);
  const hdY=torY-nkH-hdH2+10+idle;

  // Legs
  dp(-legG-legW-legSp,-bsq,legW,legH,OL);dp(-legG-legW+1-legSp,1-bsq,legW-2,legH-2,trunks);
  dp(legG+legSp,-bsq,legW,legH,OL);dp(legG+1+legSp,1-bsq,legW-2,legH-2,trunks);
  // Boots
  const bY2=legH-2-bsq;
  dp(-legG-bW/2-2-legSp,bY2,bW,bootH2,OL);dp(-legG-bW/2-1-legSp,bY2+1,bW-2,bootH2-2,boot);dp(-legG-bW/2-1-legSp,bY2+1,bW-2,1,"#FFF");
  dp(legG-bW/2+2+legSp,bY2,bW,bootH2,OL);dp(legG-bW/2+3+legSp,bY2+1,bW-2,bootH2-2,boot);dp(legG-bW/2+3+legSp,bY2+1,bW-2,1,"#FFF");
  // Trunks
  dp(-trkW,trkY,trkW*2,trkH,OL);dp(-trkW+1,trkY+1,trkW*2-2,trkH-2,trunks);
  dp(-trkW,trkY-3,trkW*2,4,OL);dp(-trkW+1,trkY-2,trkW*2-2,2,trunksBand);
  dp(-1,trkY+3,2,trkH-4,trunksBand+"40");
  ctx.fillStyle=trunksBand;ctx.font="bold "+Math.round(6*WS)+"px 'Courier New'";ctx.textAlign="center";
  ctx.save();if(facing===-1)ctx.scale(-1,1);ctx.fillText(isP1?"AAI":"CAC",0,trkY+Math.round(trkH*0.7));ctx.restore();
  // Torso
  dp(-torW,torY,torW*2,torH,OL);dp(-torW+1,torY+1,torW*2-2,torH-2,tankTop);
  dp(-torW+1,torY+1,torW*2-2,4,tankDk);dp(-1,torY+4,2,torH-6,tankDk);
  dp(-torW+4,torY-4,8,6,tankTop);dp(torW-12,torY-4,8,6,tankTop);
  // Mike's belly
  if(!isP1){ctx.fillStyle=tankDk;ctx.beginPath();ctx.ellipse(0,torY+torH*0.55,torW-3,Math.round(10*WS),0,0,Math.PI*2);ctx.fill();dp(-torW+2,torY+torH-6,torW*2-4,2,tankDk)}
  // Shoulders
  dp(-shW-3,torY+2,7,shH2,OL);dp(-shW-2,torY+3,5,shH2-2,sk);dp(-shW-2,torY+3,5,4,skD);
  dp(shW-4,torY+2,7,shH2,OL);dp(shW-3,torY+3,5,shH2-2,sk);dp(shW-3,torY+3,5,4,skD);
  // Neck
  dp(-nkW,torY-nkH+2+idle,nkW*2,nkH,OL);dp(-nkW+1,torY-nkH+3+idle,nkW*2-2,nkH-2,sk);
  if(!isP1)dp(-nkW-2,torY-nkH+4+idle,nkW*2+4,4,sk);
  // Head
  dp(-hdW,hdY,hdW*2,hdH2,OL);dp(-hdW+1,hdY+1,hdW*2-2,hdH2-2,sk);
  // Mike's wide jaw + double chin
  if(!isP1){dp(-hdW-2,hdY+hdH2*0.5,hdW*2+4,Math.round(hdH2*0.4),OL);dp(-hdW-1,hdY+hdH2*0.5+1,hdW*2+2,Math.round(hdH2*0.4)-2,sk);dp(-Math.round(8*HS),hdY+hdH2-2,Math.round(16*HS),Math.round(5*HS),skD)}
  // Hair
  if(isP1){
    const hT=hdY-Math.round(8*HS);
    dp(-hdW,hT,hdW*2,Math.round(12*HS),OL);dp(-hdW+1,hT+1,hdW*2-2,Math.round(12*HS)-2,hair);
    dp(-hdW+2,hT-2,hdW*2-4,4,hair);dp(-hdW+4,hT+1,8,2,hairHi);dp(2,hT+1,8,2,hairHi);dp(-hdW+6,hT+4,6,2,"#FFF");
    dp(-hdW-2,hdY+2,3,Math.round(10*HS),hair);dp(hdW-1,hdY+2,3,Math.round(10*HS),hair);
    dp(-hdW-2,hdY+2,3,3,hairHi);dp(hdW-1,hdY+2,3,3,hairHi);
  }else{
    const hT=hdY-Math.round(5*HS);
    dp(-hdW+3,hT,hdW*2-6,Math.round(8*HS),OL);dp(-hdW+4,hT+1,hdW*2-8,Math.round(8*HS)-2,hair);
    for(let i=0;i<6;i++)dp(-hdW+6+i*Math.round((hdW*2-12)/5),hT,3,3,hairHi);
    dp(-hdW+1,hdY,4,4,sk);dp(hdW-5,hdY,4,4,sk);
  }
  // Ears
  const earY=hdY+Math.round(hdH2*0.25),earH=Math.round(8*HS);
  dp(-hdW-4,earY,5,earH,OL);dp(-hdW-3,earY+1,3,earH-2,skD);
  dp(hdW-1,earY,5,earH,OL);dp(hdW,earY+1,3,earH-2,skD);
  // Face
  const eY=hdY+Math.round(hdH2*0.3),eSp=Math.round(5*HS),eW2=Math.round(4*HS),eH2=Math.round(3.5*HS);
  if(state==="knockdown"){ctx.strokeStyle=OL;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-eSp-3,eY);ctx.lineTo(-eSp+2,eY+5);ctx.stroke();ctx.beginPath();ctx.moveTo(-eSp+2,eY);ctx.lineTo(-eSp-3,eY+5);ctx.stroke();ctx.beginPath();ctx.moveTo(eSp-2,eY);ctx.lineTo(eSp+3,eY+5);ctx.stroke();ctx.beginPath();ctx.moveTo(eSp+3,eY);ctx.lineTo(eSp-2,eY+5);ctx.stroke()}
  else if(f%150<145){
    dp(-eSp-eW2,eY,eW2*2,eH2*2,"#FFF");dp(eSp-eW2,eY,eW2*2,eH2*2,"#FFF");
    ctx.strokeStyle=OL;ctx.lineWidth=1;ctx.strokeRect(-eSp-eW2,eY,eW2*2,eH2*2);ctx.strokeRect(eSp-eW2,eY,eW2*2,eH2*2);
    const io=state==="hitstun"?(f%2):1,iCol=state==="hitstun"?"#900":(isP1?"#446":"#334");
    dp(-eSp-eW2+1+io,eY+1,3,eH2*2-2,iCol);dp(eSp-eW2+1+io,eY+1,3,eH2*2-2,iCol);
    dp(-eSp-eW2+2+io,eY+2,2,2,"#000");dp(eSp-eW2+2+io,eY+2,2,2,"#000");
    const brY=(state==="attack"||state==="hitstun")?eY-4:eY-2;
    dp(-eSp-eW2,brY,eW2*2+1,2,OL);dp(eSp-eW2,brY,eW2*2+1,2,OL);
    if(!isP1){dp(-eSp-eW2-1,brY-1,eW2*2+3,3,OL);dp(eSp-eW2-1,brY-1,eW2*2+3,3,OL)}
  }else{dp(-eSp-eW2,eY+2,eW2*2,2,OL);dp(eSp-eW2,eY+2,eW2*2,2,OL)}
  // Nose
  const nY=eY+Math.round(8*HS),nW2=Math.round(2*HS);
  dp(-nW2,nY,nW2*2,Math.round(5*HS),skD);dp(-nW2+1,nY+1,nW2,Math.round(3*HS),skS2);
  if(!isP1)dp(-nW2-1,nY+Math.round(3*HS),nW2*2+2,2,skS2);
  // Mouth
  const mY=nY+Math.round(7*HS),mW=Math.round(5*HS);
  if(state==="attack"){dp(-mW,mY,mW*2,5,OL);dp(-mW+1,mY+1,mW*2-2,3,"#600");dp(-mW+1,mY+1,mW*2-2,1,"#FFF")}
  else if(state==="hitstun"||state==="knockdown"){dp(-mW+1,mY-1,mW*2-2,6,OL);dp(-mW+2,mY,mW*2-4,4,"#600")}
  else if(stunned){dp(-mW+1,mY,mW*2-2,4,OL);dp(-mW+2,mY+1,mW*2-4,2,"#600")}
  else{dp(-mW+1,mY+1,mW*2-2,2,skS2);if(!isP1)dp(-mW+2,mY+2,mW*2-4,1,skS2)}
  // Mike's jowls

  // Arms & Gloves

  let lEX=0,lEY=0,rPX=0,rPY=0,glow=false,isSp=false;
  if(state==="attack"&&attackType){
    const atk=ATTACKS[attackType]||ATTACKS.uppercut;
    isSp=attackType==="special_p1"||attackType==="special_p2";
    if(attackFrame<=atk.startup){rPX=-8;rPY=attackType.includes("upper")||isSp?8:0}
    else if(attackFrame<=atk.startup+atk.active){lEX=(isSp?30:(attackType==="jab"?32:attackType==="hook"?38:28))*reachS;lEY=(isSp?-35:(attackType==="uppercut"?-28:attackType==="hook"?-6:0))*S;glow=true}
    else{lEX=Math.max(0,25-(attackFrame-atk.startup-atk.active)*3)*reachS;lEY=isSp?-20*S*Math.max(0,1-(attackFrame-atk.startup-atk.active)/10):0}
  }
  if(blocking||state==="blockstun"||state==="block"){
    dp(-shW-2,armY-12,10,Math.round(22*S),OL);dp(-shW-1,armY-11,8,Math.round(22*S)-2,sk);
    dob(-shW-4,armY-Math.round(20*S),gSz,gSz,glove,gloveDk);
    dp(shW-8,armY-12,10,Math.round(22*S),OL);dp(shW-7,armY-11,8,Math.round(22*S)-2,sk);
    dob(shW-10,armY-Math.round(20*S),gSz,gSz,glove,gloveDk);
    if(state==="blockstun"&&f%6<3){ctx.globalAlpha=0.3;dp(4,armY-26,Math.round(20*WS),30,"#FFF");ctx.globalAlpha=alpha}
  }else{
    const rAX=-shW-2+rPX,rAY=armY+4+rPY;
    dp(rAX-1,armY-2,8,Math.abs(rAY-armY)+Math.round(14*S),OL);dp(rAX,armY-1,6,Math.abs(rAY-armY)+Math.round(14*S)-2,sk);
    dob(rAX-3,rAY+Math.round(10*S),gSz,gSz,glove,gloveDk);
    const lAX=shW+lEX,lAY=armY+lEY,aLen=Math.max(Math.round(12*S),lEX);
    dp(shW-2,armY-2,aLen,Math.round(10*WS),OL);dp(shW-1,armY-1,aLen-2,Math.round(10*WS)-2,sk);
    const gc=isSp&&glow?(isP1?C.gold:C.red):glove,gd=isSp&&glow?(isP1?C.goldDark:"#A02020"):gloveDk;
    if(glow){ctx.shadowColor=isSp?(isP1?C.gold:C.red):glove;ctx.shadowBlur=isSp?25:12}
    dob(lAX-2,lAY-4,gSz+2,gSz+2,gc,gd);ctx.shadowBlur=0;

// ═══════ AI ═══════
function updateAI(v,p){
  if(v.state!=="idle"&&v.state!=="walk"&&v.state!=="block"&&v.state!=="crouch")return;
  const dist=Math.abs(v.x-p.x);v.aiTimer--;if(v.aiTimer>0)return;
  if(p.state==="attack"&&p.attackFrame<5&&Math.random()<v.aiAggro*1.5){v.blocking=true;v.aiTimer=28+Math.random()*20;return}
  if(dist<70){
    const r=Math.random();
    if(v.special>=v.maxSpecial&&v.specialCooldown<=0&&r<0.12){v.state="attack";v.attackType="special_p2";v.attackFrame=0;v.hitThisAttack=false;v.special=0;v.specialCooldown=180;v.aiTimer=55;announceText="\u26A1 CAC ATTACK! \u26A1";announceTimer=30;return}
    if(r<v.aiAggro*0.5){v.state="attack";v.attackType="jab";v.attackFrame=0;v.hitThisAttack=false;v.aiTimer=30}
    else if(r<v.aiAggro*0.75){v.state="attack";v.attackType="hook";v.attackFrame=0;v.hitThisAttack=false;v.aiTimer=40}
    else if(r<v.aiAggro*0.88){v.state="attack";v.attackType="uppercut";v.attackFrame=0;v.hitThisAttack=false;v.aiTimer=48}
    else{v.blocking=true;v.aiTimer=20+Math.random()*25}
  }else if(dist<200){v.blocking=false;v.vx=v.facing*WALK_SPD*(0.5+v.aiAggro*0.4);v.aiTimer=12+Math.random()*16}
  else{v.blocking=false;v.vx=v.facing*WALK_SPD*0.85;v.aiTimer=8+Math.random()*12}
}

// ═══════ UPDATE ═══════
function updateFighter(p,opp,ctrl,isAI){
  if(p.stunned){p.stunTimer--;if(p.stunTimer<=0){p.stunned=false;p.state="idle"}p.vy+=GRAVITY;p.y+=p.vy;if(p.y>=GROUND){p.y=GROUND;p.vy=0;p.onGround=true}return}
  if(p.state==="knockdown"){p.knockdownFrames--;if(p.knockdownFrames<=0){p.state="idle";p.hp=Math.max(p.hp,1)}p.vy+=GRAVITY;p.y+=p.vy;p.x+=p.vx;p.vx*=0.92;if(p.y>=GROUND){p.y=GROUND;p.vy=0;p.onGround=true}p.x=Math.max(RING_L,Math.min(RING_R,p.x));return}
  if(p.state==="hitstun"||p.state==="blockstun"){p.stunFrames--;if(p.stunFrames<=0)p.state="idle";p.x+=p.vx;p.vx*=0.9;p.vy+=GRAVITY;p.y+=p.vy;if(p.y>=GROUND){p.y=GROUND;p.vy=0;p.onGround=true}p.x=Math.max(RING_L,Math.min(RING_R,p.x));return}
  if(p.state==="attack"){
    p.attackFrame++;const aN=p.attackType,isSp=aN==="special_p1"||aN==="special_p2";
    const atk=isSp?(aN==="special_p1"?{dmg:28,range:58,startup:16,active:8,recovery:30,hitstun:44,blockstun:20,push:10}:{dmg:20,range:56,startup:14,active:7,recovery:28,hitstun:34,blockstun:18,push:7}):ATTACKS[aN];
    if(!atk){p.state="idle";return}
    if(p.attackFrame>atk.startup&&p.attackFrame<=atk.startup+atk.active&&!p.hitThisAttack){
      if(Math.abs(p.x-opp.x)<atk.range+30){
        p.hitThisAttack=true;
        const oppBlk=opp.blocking&&opp.onGround&&opp.state!=="attack"&&opp.state!=="hitstun"&&!opp.stunned;
        if(oppBlk){opp.state="blockstun";opp.stunFrames=atk.blockstun;opp.hp-=Math.max(1,Math.floor(atk.dmg*0.12));opp.vx=p.facing*atk.push*0.4;opp.hitDir=p.facing;p.special=Math.min(p.maxSpecial,p.special+10);hitSpark={x:(p.x+opp.x)/2,y:opp.y-40,frame:0,big:false};screenShake=3;
          if(p.isPlayer)gameScore+=25}
        else{opp.state="hitstun";opp.stunFrames=atk.hitstun;opp.hp-=atk.dmg;opp.vx=p.facing*atk.push;opp.hitDir=p.facing;p.special=Math.min(p.maxSpecial,p.special+(isSp?0:20));
          opp.special=Math.min(opp.maxSpecial,opp.special+12);
          if(p.isPlayer){const pts=isSp?300:(aN==="uppercut"?150:aN==="hook"?100:50);gameScore+=pts}
          if((aN==="uppercut"||isSp)&&opp.onGround){opp.vy=isSp?-12:-7;opp.onGround=false}
          if(aN==="special_p2"&&opp.hp>0){opp.stunned=true;opp.stunTimer=120;opp.state="idle";announceText="\u26A1 CAC ATTACK! \u26A1";announceTimer=60}
          if(aN==="special_p1"){opp.vx=p.facing*10;opp.vy=-11;screenShake=10;announceText="\uD83D\uDD25 SPECIAL DELIVERY! \uD83D\uDD25";announceTimer=60}
          hitSpark={x:(p.x+opp.x)/2,y:opp.y-50,frame:0,big:isSp};screenShake=isSp?10:5;
          if(opp.hp<=0){opp.hp=0;opp.state="knockdown";opp.knockdownFrames=90;opp.vy=-8;opp.vx=p.facing*8;opp.onGround=false;screenShake=14}}}}
    if(p.attackFrame>=atk.startup+atk.active+atk.recovery){p.state="idle";p.attackType=null;p.attackFrame=0;p.hitThisAttack=false}
    p.vy+=GRAVITY;p.y+=p.vy;if(p.y>=GROUND){p.y=GROUND;p.vy=0;p.onGround=true}p.x=Math.max(RING_L,Math.min(RING_R,p.x));return}
  p.facing=p.x<opp.x?1:-1;
  if(!isAI){
    const left=keys[ctrl.left],right=keys[ctrl.right],up=keys[ctrl.up],down=keys[ctrl.down];
    const holdBack=(p.facing===1&&left)||(p.facing===-1&&right);
    p.blocking=holdBack&&p.onGround&&!down;p.crouching=down&&p.onGround;
    if(left)p.vx=-WALK_SPD;else if(right)p.vx=WALK_SPD;else p.vx=0;
    if(p.blocking)p.vx*=0.3;if(p.crouching)p.vx*=0.4;
    if(up&&p.onGround&&!p.crouching&&!p.blocking){p.vy=JUMP_FORCE;p.onGround=false}
    p.walkCycle+=Math.abs(p.vx);
    if(p.specialCooldown>0)p.specialCooldown--;
    if(!p.blocking){
      if(justPressed[ctrl.special]&&p.special>=p.maxSpecial&&p.specialCooldown<=0){p.state="attack";p.attackType="special_p1";p.attackFrame=0;p.hitThisAttack=false;p.special=0;p.specialCooldown=120;justPressed[ctrl.special]=false}
      else if(justPressed[ctrl.jab]&&p.onGround){p.state="attack";p.attackType="jab";p.attackFrame=0;p.hitThisAttack=false;justPressed[ctrl.jab]=false}
      else if(justPressed[ctrl.hook]&&p.onGround){p.state="attack";p.attackType="hook";p.attackFrame=0;p.hitThisAttack=false;justPressed[ctrl.hook]=false}
      else if(justPressed[ctrl.upper]){p.state="attack";p.attackType="uppercut";p.attackFrame=0;p.hitThisAttack=false;justPressed[ctrl.upper]=false}}
  }
  p.vy+=GRAVITY;p.x+=p.vx;p.y+=p.vy;
  if(p.y>=GROUND){p.y=GROUND;p.vy=0;p.onGround=true}p.x=Math.max(RING_L,Math.min(RING_R,p.x));
  const dist=Math.abs(p.x-opp.x);
  if(dist<PUSH_DIST){const push=(PUSH_DIST-dist)/2;if(p.x<opp.x){p.x-=push;opp.x+=push}else{p.x+=push;opp.x-=push}p.x=Math.max(RING_L,Math.min(RING_R,p.x));opp.x=Math.max(RING_L,Math.min(RING_R,opp.x))}
  if(p.state!=="attack"){if(!p.onGround)p.state="jump";else if(p.blocking)p.state="block";else if(p.crouching)p.state="crouch";else if(Math.abs(p.vx)>1)p.state="walk";else p.state="idle"}
  p.special=Math.min(p.maxSpecial,p.special+0.18);
}

function update(){
  frame++;if(announceTimer>0)announceTimer--;
  if(screen==="title"){if(keys["Enter"]||keys["1"]||justPressed["z"]||justPressed[" "])startMatch();Object.keys(justPressed).forEach(k=>justPressed[k]=false);return}
  if(screen==="intro"){introTimer++;if(introTimer>200||keys["Enter"]||justPressed["z"]||justPressed[" "])resetRound();Object.keys(justPressed).forEach(k=>justPressed[k]=false);return}
  if(screen==="roundEnd"){roundEndTimer++;if(roundEndTimer>120){if(pWins>=2){screen="enterName";nameInput="";companyInput="";activeField="name";nameSubmitted=false;entryError=""}else if(vWins>=2){screen="matchEnd";matchEndTimer=0}else if(roundNum>=3){if(pWins>vWins){screen="enterName";nameInput="";companyInput="";activeField="name";nameSubmitted=false;entryError=""}else{screen="matchEnd";matchEndTimer=0}}else{roundNum++;resetRound()}}Object.keys(justPressed).forEach(k=>justPressed[k]=false);return}
  if(screen==="matchEnd"){matchEndTimer++;if(matchEndTimer>120&&(keys["Enter"]||keys["1"]||justPressed["z"]||justPressed[" "])){screen="title";fetchLeaderboard()}Object.keys(justPressed).forEach(k=>justPressed[k]=false);return}
  if(screen==="enterName"){Object.keys(justPressed).forEach(k=>justPressed[k]=false);return}
  if(screen==="matchEnd"&&matchEndTimer===0)fetchLeaderboard();
  updateAI(villain,player);
  updateFighter(player,villain,PK,false);
  updateFighter(villain,player,null,true);
  player.vx*=0.9;villain.vx*=0.9;
  if(hitSpark){hitSpark.frame++;if(hitSpark.frame>12)hitSpark=null}
  if(screenShake>0)screenShake--;
  timerAccum++;if(timerAccum>=60){timerAccum=0;roundTimer=Math.max(0,roundTimer-1)}
  if((player.hp<=0&&player.state==="knockdown"&&player.onGround)||(villain.hp<=0&&villain.state==="knockdown"&&villain.onGround)||roundTimer<=0){
    if(player.hp>villain.hp){pWins++;gameScore+=500+player.hp*10+Math.max(0,roundTimer)*5}else if(villain.hp>player.hp)vWins++;else{pWins+=0.5;vWins+=0.5}
    screen="roundEnd";roundEndTimer=0;
    announceText=player.hp>villain.hp?"THE POSTMAN DELIVERS!":"CAC ATTACK WINS!";announceTimer=120}
  Object.keys(justPressed).forEach(k=>justPressed[k]=false);
}

  ctx.fillText("GROWTH IS IN THE MAIL",p1X,274);
  ctx.fillStyle=C.green;ctx.beginPath();ctx.arc(cx2,200,20,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=C.charcoal;ctx.font="bold 16px 'Courier New'";ctx.fillText("VS",cx2,206);
  const p2X=cx2+160*sl;
  ctx.fillStyle="rgba(66,103,178,0.08)";ctx.fillRect(p2X-110,115,220,180);ctx.strokeStyle=C.metaBlue;ctx.lineWidth=2;ctx.strokeRect(p2X-110,115,220,180);
  ctx.fillStyle=C.metaBlue;ctx.font="bold 10px 'Courier New'";ctx.fillText("AI \u2014 OPPONENT",p2X,133);
  ctx.fillStyle=C.linen;ctx.font="bold 14px 'Courier New'";ctx.fillText(P2_INFO.shortName,p2X,155);
  ctx.fillStyle=C.steel;ctx.font="9px 'Courier New'";
  ctx.fillText(P2_INFO.record,p2X,175);ctx.fillText("HEIGHT: "+P2_INFO.height+"  WEIGHT: "+P2_INFO.weight,p2X,190);
  ctx.fillText("STYLE: "+P2_INFO.style,p2X,205);ctx.fillText("FROM: "+P2_INFO.from,p2X,220);
  ctx.fillStyle=C.orange;ctx.font="bold 9px 'Courier New'";ctx.fillText("\u26A1 CAC ATTACK \u26A1",p2X,240);
  ctx.fillStyle=C.steel;ctx.font="8px 'Courier New'";ctx.fillText('"'+P2_INFO.tagline+'"',p2X,258);
  ctx.fillText("YOUR ROAS ENDS HERE",p2X,274);
  if(t>60){ctx.globalAlpha=0.5+Math.sin(frame*0.08)*0.4;ctx.fillStyle=C.linen;ctx.font="bold 14px 'Courier New'";ctx.fillText("PRESS ENTER TO FIGHT",cx2,330);ctx.globalAlpha=1}
  ctx.fillStyle=C.steel;ctx.font="8px 'Courier New'";ctx.fillText("#FIGHTCAC  \xB7  SHOPTALK 2026",cx2,370);
}

function drawMatchEnd(){
  drawRing();ctx.fillStyle="rgba(6,6,12,0.8)";ctx.fillRect(0,0,W,H);
  const cx2=W/2,t=matchEndTimer,winner=pWins>vWins;
  for(let i=0;i<80;i++){const seed=i*73,cx3=(seed*3.7+t*(1.2+(seed%3)))%W,cy=(seed*2.1+t*(1.8+(seed%2)))%(H+40)-20;ctx.fillStyle=[C.green,C.lime,C.gold,"#FFF",C.orange][seed%5];ctx.globalAlpha=0.7;ctx.fillRect(cx3,cy,4+seed%3,2+seed%2)}ctx.globalAlpha=1;
  ctx.fillStyle=C.lime;ctx.font="bold 10px 'Courier New'";ctx.textAlign="center";ctx.fillText("POSTPILOT PRESENTS",cx2,35);
  if(winner){
    const bY=65;dp(cx2-130,bY,260,20,"#5A3A1A");
    const pg=ctx.createLinearGradient(cx2-60,bY-8,cx2-60,bY+42);pg.addColorStop(0,"#FFD700");pg.addColorStop(0.3,"#FFF0A0");pg.addColorStop(0.6,"#FFD700");pg.addColorStop(1,"#B8860B");
    ctx.fillStyle=pg;ctx.fillRect(cx2-60,bY-8,120,42);ctx.strokeStyle="#B8860B";ctx.lineWidth=2;ctx.strokeRect(cx2-60,bY-8,120,42);
    ctx.fillStyle="#DAA520";ctx.fillRect(cx2-95,bY,30,22);ctx.fillRect(cx2+65,bY,30,22);
    ctx.fillStyle="#8B6914";ctx.font="bold 8px 'Courier New'";ctx.fillText("ACQUISITIONAI",cx2,bY+14);ctx.font="bold 6px 'Courier New'";ctx.fillText("\u2605 KING OF ACQUISITION \u2605",cx2,bY+24);
    ctx.fillStyle=C.gold;ctx.font="bold 20px 'Courier New'";ctx.fillText("\u2605 NEW CHAMPION \u2605",cx2,140);
    ctx.fillStyle=C.green;ctx.font="bold 16px 'Courier New'";ctx.fillText(P1_INFO.shortName,cx2,162);
    ctx.fillStyle=C.green;ctx.font="bold 11px 'Courier New'";ctx.fillText("GROWTH IS IN THE MAIL",cx2,182);
    ctx.fillStyle=C.linen;ctx.font="bold 10px 'Courier New'";ctx.fillText("FINAL SCORE: "+gameScore,cx2,200);
  }else{
    ctx.fillStyle=C.metaBlue;ctx.font="bold 22px 'Courier New'";ctx.fillText("EPSTEIN WINS!",cx2,80);
    ctx.fillStyle=C.linen;ctx.font="bold 12px 'Courier New'";ctx.fillText("THE CAC ATTACK PREVAILS",cx2,110);
    ctx.fillStyle=C.steel;ctx.font="10px 'Courier New'";ctx.fillText("BUT THE POSTMAN NEVER STAYS DOWN",cx2,135);
    ctx.fillStyle=C.linen;ctx.font="bold 10px 'Courier New'";ctx.fillText("SCORE: "+gameScore,cx2,160);
  }
  drawLeaderboard(cx2-160,215,320);
  ctx.fillStyle=C.green;ctx.font="bold 9px 'Courier New'";ctx.textAlign="center";ctx.fillText("POSTPILOT.COM/ACQUISITIONAI",cx2,H-30);
  ctx.fillStyle=C.lime;ctx.font="9px 'Courier New'";ctx.fillText("#FIGHTCAC",cx2,H-18);
  if(t>120){ctx.globalAlpha=0.4+Math.sin(t*0.06)*0.4;ctx.fillStyle=C.linen;ctx.font="bold 11px 'Courier New'";ctx.fillText("PRESS ENTER TO PLAY AGAIN",cx2,H-4);ctx.globalAlpha=1}
}

function drawLeaderboard(startX,startY,maxW){
  const cx2=startX+maxW/2;
  ctx.fillStyle=C.gold;ctx.font="bold 11px 'Courier New'";ctx.textAlign="center";ctx.fillText("\u2605 TOP FIGHTERS \u2605",cx2,startY);
  if(!leaderboardLoaded){ctx.fillStyle=C.steel;ctx.font="9px 'Courier New'";ctx.fillText("Loading...",cx2,startY+18);return startY+30}
  if(leaderboard.length===0){ctx.fillStyle=C.steel;ctx.font="9px 'Courier New'";ctx.fillText("No scores yet \u2014 be the first!",cx2,startY+18);return startY+30}
  const cR=startX+4,cN=startX+30,cS=startX+maxW-4;let ly=startY+16;
  ctx.fillStyle=C.steel;ctx.font="bold 8px 'Courier New'";ctx.textAlign="left";ctx.fillText("#",cR,ly);ctx.fillText("NAME",cN,ly);ctx.textAlign="right";ctx.fillText("SCORE",cS,ly);
  ly+=4;dp(startX,ly,maxW,1,C.steel+"40");ly+=8;
  leaderboard.forEach((entry,i)=>{const top3=i<3;ctx.textAlign="left";ctx.fillStyle=top3?C.gold:C.linen;ctx.font=(top3?"bold ":"")+"9px 'Courier New'";
    ctx.fillText(String(i+1),cR,ly);ctx.fillStyle=top3?C.green:C.linen;ctx.fillText((entry.name||"???").substring(0,20),cN,ly);
    ctx.textAlign="right";ctx.fillStyle=top3?C.gold:C.lime;ctx.fillText(String(entry.score||0),cS,ly);ly+=14});return ly}

function drawEnterName(){
  drawRing();ctx.fillStyle="rgba(6,6,12,0.88)";ctx.fillRect(0,0,W,H);const cx2=W/2;
  for(let i=0;i<40;i++){const seed=i*73,t=frame,cx3=(seed*3.7+t*(0.8+(seed%3)))%W,cy=(seed*2.1+t*(1.2+(seed%2)))%(H+40)-20;ctx.fillStyle=[C.green,C.lime,C.gold,"#FFF",C.orange][seed%5];ctx.globalAlpha=0.5;ctx.fillRect(cx3,cy,3+seed%3,2)}ctx.globalAlpha=1;
  ctx.fillStyle=C.gold;ctx.font="bold 22px 'Courier New'";ctx.textAlign="center";ctx.fillText("\u2605 VICTORY! \u2605",cx2,50);
  ctx.fillStyle=C.green;ctx.font="bold 14px 'Courier New'";ctx.fillText("THE POSTMAN DELIVERS!",cx2,75);
  ctx.fillStyle=C.linen;ctx.font="bold 28px 'Courier New'";ctx.fillText("SCORE: "+gameScore,cx2,110);
  ctx.fillStyle=C.lime;ctx.font="bold 10px 'Courier New'";ctx.fillText("ENTER YOUR NAME FOR THE LEADERBOARD",cx2,148);
  const fW=260,fH=28,fX=cx2-fW/2;
  ctx.fillStyle=C.steel;ctx.font="bold 9px 'Courier New'";ctx.textAlign="left";ctx.fillText("YOUR NAME",fX,172);
  dp(fX,176,fW,fH,"#1A1A30");ctx.strokeStyle=C.green;ctx.lineWidth=2;ctx.strokeRect(fX,176,fW,fH);
  ctx.fillStyle=C.linen;ctx.font="14px 'Courier New'";ctx.textAlign="left";
  ctx.fillText(nameInput+(frame%40<25?"_":""),fX+8,195);
  if(nameInput.length>0&&containsProfanity(nameInput)){ctx.fillStyle=C.red;ctx.font="bold 9px 'Courier New'";ctx.textAlign="right";ctx.fillText("\u2716",fX+fW-8,195)}
  else if(nameInput.trim().length>=2){ctx.fillStyle=C.green;ctx.font="bold 9px 'Courier New'";ctx.textAlign="right";ctx.fillText("\u2714",fX+fW-8,195)}
  ctx.fillStyle=C.steel;ctx.font="8px 'Courier New'";ctx.textAlign="center";ctx.fillText("ENTER TO SUBMIT",cx2,222);
  if(nameSubmitted){ctx.fillStyle=C.green;ctx.font="bold 12px 'Courier New'";ctx.fillText("SUBMITTING...",cx2,250)}
  else if(entryError){ctx.fillStyle=C.red;ctx.font="bold 11px 'Courier New'";ctx.fillText("\u26A0 "+entryError+" \u26A0",cx2,245);ctx.fillStyle=C.steel;ctx.font="8px 'Courier New'";ctx.fillText("FIX AND TRY AGAIN",cx2,260)}
  else if(nameInput.trim().length===0){ctx.fillStyle=C.steel;ctx.font="9px 'Courier New'";ctx.fillText("TYPE YOUR NAME TO CONTINUE",cx2,250)}
  else{ctx.globalAlpha=0.5+Math.sin(frame*0.08)*0.4;ctx.fillStyle=C.green;ctx.font="bold 12px 'Courier New'";ctx.fillText("\u25B6 PRESS ENTER TO SUBMIT \u25C0",cx2,250);ctx.globalAlpha=1}
  drawLeaderboard(cx2-160,280,320);
  ctx.fillStyle=C.steel;ctx.font="7px 'Courier New'";ctx.textAlign="center";ctx.fillText("#FIGHTCAC  \xB7  POSTPILOT.COM/ACQUISITIONAI",cx2,H-10)}

function drawScoreHUD(){ctx.fillStyle=C.gold;ctx.font="bold 9px 'Courier New'";ctx.textAlign="center";ctx.fillText("SCORE: "+gameScore,W/2,H-8)}

function draw(){
  ctx.save();
  if(screenShake>0)ctx.translate(Math.sin(frame*1.5)*screenShake,Math.cos(frame*1.8)*screenShake*0.5);
  if(screen==="title"){drawTitle();ctx.restore();return}
  if(screen==="intro"){drawIntro();ctx.restore();return}
  if(screen==="enterName"){drawEnterName();ctx.restore();return}
  if(screen==="matchEnd"){drawMatchEnd();ctx.restore();return}
  drawRing();
  if(player.y<=villain.y){drawBoxer(player,true);drawBoxer(villain,false)}
  else{drawBoxer(villain,false);drawBoxer(player,true)}
  drawHitSpark();drawHUD();drawScoreHUD();drawAnnounce();
  if(screen==="roundEnd"){
    ctx.fillStyle="rgba(6,6,12,0.6)";ctx.fillRect(0,150,W,80);
    const cx2=W/2,w=player.hp>villain.hp;
    ctx.fillStyle=w?C.green:C.metaBlue;ctx.font="bold 28px 'Courier New'";ctx.textAlign="center";
    ctx.fillText(w?"THE POSTMAN WINS!":"CAC ATTACK WINS!",cx2,185);
    ctx.fillStyle=C.steel;ctx.font="bold 12px 'Courier New'";ctx.fillText("ROUND "+roundNum,cx2,210)}
  ctx.restore();
}

function gameLoop(){update();draw();requestAnimationFrame(gameLoop)}
gameLoop();
</script>
